<aside class="info-panel">
  <dl class="details">
    <div class="details__group">
      <dt>Started at</dt>
      <dd>{{ debouncedAnalysisStartDate.value() }}</dd>
    </div>

    <div class="details__group">
      <dt>Target URL</dt>
      <dd class="details__url">{{ debouncedTargetURL.value() }}</dd>
    </div>

    @if (debouncedLimitRange.value()) {
      <div class="details__group">
        <dt>Date Range</dt>
        <dd class="details__range">
          <span>{{ debouncedStartDate.value() }}</span>
          <span class="details__range-sep">–</span>
          <span>{{ debouncedEndDate.value() }}</span>
        </dd>
      </div>
    }
  </dl>
</aside>
