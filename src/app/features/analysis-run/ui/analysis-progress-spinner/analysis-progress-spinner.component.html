<div class="loading">
  <div class="loading__spinner">
    <div class="loading__spinner-ring"></div>
    <div class="loading__spinner-ring"></div>
    <div class="loading__spinner-ring"></div>
  </div>
  <p class="loading__label">{{ label() }}</p>

  <button #firstButton btn="secondary" (click)="abortAnalysis()">Abort</button>
</div>

<app-info-panel [pendingAnalysis]="pendingAnalysis()"></app-info-panel>

@if (showModal) {
  <app-confirm-operation-modal
    (cancel)="onCancel()"
    (confirm)="onConfirm()"
  ></app-confirm-operation-modal>
}
