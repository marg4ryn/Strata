@if (error()) {
  <app-analysis-error-modal
    [error]="error()"
    [errorType]="errorType()"
    [pendingAnalysis]="pendingAnalysis()"
    (retry)="retryAnalysis()"
    (cancel)="cancelAnalysis()"
  ></app-analysis-error-modal>
} @else if (isBusy()) {
  <app-analysis-progress-spinner
    [label]="debouncedLabel.value()"
    [pendingAnalysis]="pendingAnalysis()"
    (abort)="abortAnalysis()"
  ></app-analysis-progress-spinner>
} @else if (showModal()) {
  <app-analysis-unfinished-modal
    [pendingAnalysis]="pendingAnalysis()"
    (resume)="resumeAnalysis()"
    (abandon)="abandonAnalysis()"
  ></app-analysis-unfinished-modal>
} @else {
  <app-analysis-target-form
    (analysisTargetData)="startNewAnalysis($event)"
  ></app-analysis-target-form>
}
